<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <title>WayFare</title>
    <link rel="icon" type="image/jpeg" href="/Wayfare_favicon.jpeg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:ital,wght@0,300..800;1,300..800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root">
      <div style="position: fixed; inset: 0; background: #0B0E14; color: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 99999; font-family: 'Plus Jakarta Sans', sans-serif;">
        <div style="position: relative; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 16px;">
          <div style="position: relative; width: 100px; height: 100px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.15); background: #141822; padding: 10px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center;">
            <img src="/Wayfare_favicon.jpeg" alt="Wayfare" style="width: 100%; height: 100%; object-fit: cover; border-radius: 12px;" />
          </div>
          <div>
            <h1 style="font-size: 28px; font-weight: 800; margin: 0; letter-spacing: -0.5px; color: #ffffff;">Wayfare</h1>
            <p style="font-size: 13px; color: #8B9298; margin: 4px 0 0 0; font-weight: 500;">Shared Journeys. <span style="color: #F59E0B;">Verified Rides.</span></p>
          </div>
          <div style="width: 96px; height: 2px; border-radius: 999px; background: linear-gradient(90deg, #F59E0B, #2FE1B8); margin-top: 8px;"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
